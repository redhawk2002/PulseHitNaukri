<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProfilePulse Automation Dashboard</title>
    <style>
        :root {
            --primary: #4A90E2;
            --success: #2ecc71;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #f5f6fa;
            --border: #dcdde1;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: var(--primary);
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
            margin-top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            background-color: var(--success);
            color: white;
            font-size: 0.9em;
            font-weight: bold;
        }
        .status-badge.stopped {
            background-color: var(--danger);
        }
        button {
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            font-weight: 500;
        }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-danger { background-color: var(--danger); color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .grid-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }
        .option-box {
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 8px;
            background: #fafafa;
        }
        select, input[type="time"] {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }
        .logs {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            border-radius: 5px;
            height: 250px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 0.85em;
            white-space: pre-wrap;
            margin-top: 10px;
        }
        .spinner {
            display: none; border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%; width: 16px; height: 16px;
            animation: spin 1s linear infinite; vertical-align: middle;
            margin-left: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            ProfilePulse Dashboard
            <span id="headerStatus" class="status-badge">Running</span>
        </h1>
        
        <div class="card">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <div>
                    <h3>Scheduler Control</h3>
                    <p>Current Activity: <strong id="currentActivity">Every 12 hours</strong></p>
                </div>
                <button id="toggleBtn" class="btn-danger" onclick="toggleScheduler()">Stop Job</button>
            </div>
        </div>

        <div class="card">
            <h3>Easy Schedule Settings</h3>
            <div class="grid-options">
                <div class="option-box">
                    <label>Interval Update</label>
                    <select id="intervalSelect" onchange="applyInterval()">
                        <option value="">-- Choose Interval --</option>
                        <option value="0 */4 * * *">Every 4 hours</option>
                        <option value="0 */6 * * *">Every 6 hours</option>
                        <option value="0 */12 * * *">Every 12 hours (Standard)</option>
                        <option value="0 0 * * *">Every 24 hours</option>
                    </select>
                </div>
                <div class="option-box">
                    <label>Specific Daily Time</label>
                    <div style="display:flex; gap:5px;">
                        <input type="time" id="timeInput">
                        <button class="btn-primary" style="margin-top:10px;" onclick="applyTime()">Set</button>
                    </div>
                </div>
            </div>
            <p id="scheduleMsg" style="color:var(--success); font-weight:500; margin-top:10px; display:none;"></p>
        </div>

        <div class="card">
            <h3>Quick Actions</h3>
            <div style="display:flex; gap:10px;">
                <button class="btn-success" onclick="runManual()">
                    Force Update Now <div class="spinner" id="runSpinner"></div>
                </button>
                <button class="btn-primary" onclick="window.open('https://www.naukri.com/mnjuser/profile', '_blank')">View Naukri Profile</button>
            </div>
            <p id="manualMsg" style="color:var(--success); font-weight:500; margin-top:10px; display:none;"></p>
        </div>

        <div class="card">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h3>Activity Logs</h3>
                <button class="btn-primary" style="padding: 5px 12px; font-size: 0.8em;" onclick="fetchLogs()">Refresh</button>
            </div>
            <div class="logs" id="logContent">Initializing logs...</div>
        </div>
    </div>

    <script>
        let isRunning = true;

        function cronToHuman(cron) {
            if (!cron) return 'Not Set';
            const parts = cron.split(' ');
            if (parts.length !== 5) return cron;

            const [m, h, dom, mon, dow] = parts;

            // Interval pattern: 0 */N * * *
            if (m === '0' && h.startsWith('*/') && dom === '*' && mon === '*' && dow === '*') {
                const hours = h.replace('*/', '');
                return `Every ${hours} hours`;
            }

            // Daily at specific time: M H * * *
            if (dom === '*' && mon === '*' && dow === '*') {
                const hour = parseInt(h);
                const minute = m.padStart(2, '0');
                const period = hour >= 12 ? 'PM' : 'AM';
                const displayHour = hour % 12 || 12;
                return `Daily at ${displayHour}:${minute} ${period}`;
            }

            // Standard multiple times: 0 9,21 * * *
            if (m === '0' && h.includes(',') && dom === '*' && mon === '*' && dow === '*') {
                const hours = h.split(',').map(hourStr => {
                    const hour = parseInt(hourStr);
                    const period = hour >= 12 ? 'PM' : 'AM';
                    const displayHour = hour % 12 || 12;
                    return `${displayHour} ${period}`;
                });
                return hours.join(' and ') + ' daily';
            }

            return cron; // Fallback
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                isRunning = data.status === 'running';
                
                const badge = document.getElementById('headerStatus');
                const toggleBtn = document.getElementById('toggleBtn');
                const activityVal = document.getElementById('currentActivity');
                
                badge.innerText = isRunning ? 'Running' : 'Stopped';
                badge.className = isRunning ? 'status-badge' : 'status-badge stopped';
                
                toggleBtn.innerText = isRunning ? 'Stop Job' : 'Start Job';
                toggleBtn.className = isRunning ? 'btn-danger' : 'btn-success';
                
                activityVal.innerText = isRunning ? cronToHuman(data.cronSchedule) : 'Inactive';
            } catch(e) {
                console.error("Status check failed");
            }
        }

        async function toggleScheduler() {
            try {
                const res = await fetch('/api/toggle-scheduler', { method: 'POST' });
                const data = await res.json();
                showMessage('scheduleMsg', data.message);
                fetchStatus();
            } catch(e) {
                alert('Toggle failed');
            }
        }

        async function applyInterval() {
            const cron = document.getElementById('intervalSelect').value;
            if (!cron) return;
            saveSchedule(cron);
        }

        async function applyTime() {
            const time = document.getElementById('timeInput').value;
            if (!time) return;
            const [hour, minute] = time.split(':');
            const cron = `${minute} ${hour} * * *`;
            saveSchedule(cron);
        }

        async function saveSchedule(cron) {
            try {
                const res = await fetch('/api/schedule', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ schedule: cron })
                });
                const data = await res.json();
                showMessage('scheduleMsg', data.message);
                fetchStatus();
            } catch(e) {
                alert('Schedule update failed');
            }
        }

        async function runManual() {
            const spinner = document.getElementById('runSpinner');
            spinner.style.display = 'inline-block';
            try {
                const res = await fetch('/api/manual', { method: 'POST' });
                const data = await res.json();
                showMessage('manualMsg', data.message);
            } catch(e) {
                alert('Manual run trigger failed');
            } finally {
                spinner.style.display = 'none';
                setTimeout(fetchLogs, 2000);
            }
        }

        function showMessage(id, text) {
            const el = document.getElementById(id);
            el.innerText = text;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        async function fetchLogs() {
            try {
                const res = await fetch('/api/logs');
                const data = await res.json();
                const logBox = document.getElementById('logContent');
                if (data.logs && data.logs.length) {
                    logBox.innerHTML = data.logs.map(l => {
                        if (l.includes('[ERROR]')) return `<span style="color:#ff4757">${l}</span>`;
                        if (l.includes('[WARN]')) return `<span style="color:#ffa502">${l}</span>`;
                        return l;
                    }).join('<br>');
                } else {
                    logBox.innerHTML = "Waiting for logs...";
                }
                logBox.scrollTop = logBox.scrollHeight;
            } catch(e) {}
        }

        // Auto-refresh
        fetchStatus();
        fetchLogs();
        setInterval(fetchStatus, 3000);
        setInterval(fetchLogs, 5000);
    </script>
</body>
</html>
